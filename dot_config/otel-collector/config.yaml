receivers:
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317

processors:
    batch: {}

exporters:
    # Traces -> Jaeger (reachable by container name on the shared OTel network).
    otlp_grpc/jaeger:
        endpoint: jaeger:4317
        tls:
            insecure: true
    # Metrics -> Prometheus scrape endpoint exposed by the collector itself.
    prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
            enabled: true

service:
    # Keep the collector's own logs quiet; we only care about agent telemetry.
    telemetry:
        logs:
            level: warn
    pipelines:
        traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp_grpc/jaeger]
        metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [prometheus]
